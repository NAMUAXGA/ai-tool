<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전사 AI Tool 구독 현황 대시보드</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- PapaParse (CSV 파싱용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .stat-card { border-left: 5px solid #0d6efd; }
    .stat-card-total { border-left-color: #198754; }
    .table-responsive { max-height: 500px; overflow-y: auto; }
  </style>
</head>
<body>

<div class="container py-4">
  <h2 class="fw-bold mb-4">📊 전사 AI Tool 구독 현황 대시보드</h2>

  <!-- 1. 구글 시트 CSV 연동 설정 영역 -->
  <div class="card p-3 mb-4 bg-white">
    <label for="csvUrlInput" class="form-label fw-bold">🔗 구글 시트 CSV URL 연동</label>
    <div class="input-group">
      <input type="text" id="csvUrlInput" class="form-control" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv">
      <button class="btn btn-primary" onclick="saveAndFetchUrl()">연동하기</button>
      <button class="btn btn-outline-secondary" onclick="resetUrl()">초기화</button>
    </div>
    <div class="form-text mt-1">구글 시트 > [파일] > [공유] > [웹에 게시] > <b>쉼표로 구분된 값(.csv)</b> 링크를 입력해 주세요.</div>
  </div>

  <!-- 2. 요약 카드 (KPI) -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card p-3 stat-card bg-white">
        <span class="text-muted fw-bold">총 구독 항목 수</span>
        <h3 class="fw-bold my-1" id="totalCount">0 건</h3>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card p-3 stat-card stat-card-total bg-white">
        <span class="text-muted fw-bold">총 월간 비용</span>
        <h3 class="fw-bold my-1 text-success" id="totalCost">0 원</h3>
      </div>
    </div>
  </div>

  <!-- 3. 차트 영역 (부활!) -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card p-3 bg-white">
        <h6 class="fw-bold mb-3">🏢 본부별 AI Tool 사용 건수</h6>
        <div style="position: relative; height:250px;">
          <canvas id="deptChart"></canvas>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card p-3 bg-white">
        <h6 class="fw-bold mb-3">🛠️ 주요 프로그램별 구독 건수</h6>
        <div style="position: relative; height:250px;">
          <canvas id="toolChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. 필터 및 검색 -->
  <div class="card p-3 mb-4 bg-white">
    <div class="row g-2">
      <div class="col-md-4">
        <input type="text" id="searchInput" class="form-control" placeholder="프로그램명 / 사용자 / 용도 검색..." onkeyup="filterData()">
      </div>
      <div class="col-md-4">
        <select id="deptFilter" class="form-select" onchange="filterData()">
          <option value="">전체 본부 보기</option>
        </select>
      </div>
      <div class="col-md-4">
        <select id="toolFilter" class="form-select" onchange="filterData()">
          <option value="">전체 프로그램 보기</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 5. 데이터 테이블 -->
  <div class="card p-3 bg-white">
    <div class="table-responsive">
      <table class="table table-hover align-middle" id="dataTable">
        <thead class="table-light sticky-top">
          <tr>
            <th>No.</th>
            <th>구분</th>
            <th>프로그램명</th>
            <th>버전</th>
            <th>본부</th>
            <th>사용자</th>
            <th>사용용도</th>
            <th>수량</th>
            <th>단가</th>
            <th>총액</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="10" class="text-center py-4 text-muted">데이터를 불러오는 중이거나 URL이 설정되지 않았습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let rawData = [];
  let deptChartObj = null;
  let toolChartObj = null;

  // 페이지 로드 시 저장된 URL 불러오기
  window.onload = function() {
    const savedUrl = localStorage.getItem('googleSheetCsvUrl');
    if (savedUrl) {
      document.getElementById('csvUrlInput').value = savedUrl;
      fetchCsvData(savedUrl);
    }
  };

  function saveAndFetchUrl() {
    const url = document.getElementById('csvUrlInput').value.trim();
    if (!url) {
      alert('URL을 입력해 주세요.');
      return;
    }
    localStorage.setItem('googleSheetCsvUrl', url);
    fetchCsvData(url);
  }

  function resetUrl() {
    localStorage.removeItem('googleSheetCsvUrl');
    document.getElementById('csvUrlInput').value = '';
    location.reload();
  }

  function fetchCsvData(url) {
    Papa.parse(url, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        rawData = results.data;
        initFilters();
        renderDashboard(rawData);
      },
      error: function(err) {
        alert('CSV 데이터를 불러오는 데 실패했습니다. URL을 확인해 주세요.');
        console.error(err);
      }
    });
  }

  function initFilters() {
    const depts = new Set();
    const tools = new Set();

    rawData.forEach(row => {
      if(row['본부']) depts.add(row['본부'].trim());
      if(row['프로그램명']) tools.add(row['프로그램명'].trim());
    });

    const deptSelect = document.getElementById('deptFilter');
    const toolSelect = document.getElementById('toolFilter');

    deptSelect.innerHTML = '<option value="">전체 본부 보기</option>';
    toolSelect.innerHTML = '<option value="">전체 프로그램 보기</option>';

    depts.forEach(d => deptSelect.innerHTML += `<option value="${d}">${d}</option>`);
    tools.forEach(t => toolSelect.innerHTML += `<option value="${t}">${t}</option>`);
  }

  function filterData() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const selectedDept = document.getElementById('deptFilter').value;
    const selectedTool = document.getElementById('toolFilter').value;

    const filtered = rawData.filter(row => {
      const matchSearch = Object.values(row).some(val => String(val).toLowerCase().includes(search));
      const matchDept = !selectedDept || (row['본부'] && row['본부'].trim() === selectedDept);
      const matchTool = !selectedTool || (row['프로그램명'] && row['프로그램명'].trim() === selectedTool);
      return matchSearch && matchDept && matchTool;
    });

    renderDashboard(filtered);
  }

  function renderDashboard(data) {
    renderTable(data);
    renderStats(data);
    renderCharts(data);
  }

  function renderTable(data) {
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = '';

    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="text-center py-4 text-muted">검색 결과가 없습니다.</td></tr>';
      return;
    }

    data.forEach((row, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${row['No.'] || idx + 1}</td>
        <td>${row['구분'] || ''}</td>
        <td class="fw-bold">${row['프로그램명'] || ''}</td>
        <td>${row['버전'] || ''}</td>
        <td>${row['본부'] || ''}</td>
        <td>${row['사용자'] || ''}</td>
        <td>${row['사용용도'] || ''}</td>
        <td>${row['수량'] || ''}</td>
        <td>${row['단가'] || ''}</td>
        <td class="fw-bold text-primary">${row['총액'] || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderStats(data) {
    document.getElementById('totalCount').innerText = `${data.length} 건`;

    let totalSum = 0;
    data.forEach(row => {
      if (row['총액']) {
        const num = parseInt(String(row['총액']).replace(/[^0-9]/g, ''), 10);
        if (!isNaN(num)) totalSum += num;
      }
    });

    document.getElementById('totalCost').innerText = totalSum.toLocaleString() + ' 원';
  }

  function renderCharts(data) {
    // 본부별 카운트
    const deptCounts = {};
    // 프로그램별 카운트
    const toolCounts = {};

    data.forEach(row => {
      const dept = row['본부'] ? row['본부'].trim() : '미지정';
      const tool = row['프로그램명'] ? row['프로그램명'].trim() : '기타';

      deptCounts[dept] = (deptCounts[dept] || 0) + 1;
      toolCounts[tool] = (toolCounts[tool] || 0) + 1;
    });

    // 1. 본부별 차트 (막대)
    const ctxDept = document.getElementById('deptChart').getContext('2d');
    if (deptChartObj) deptChartObj.destroy();
    deptChartObj = new Chart(ctxDept, {
      type: 'bar',
      data: {
        labels: Object.keys(deptCounts),
        datasets: [{
          label: '사용 건수',
          data: Object.values(deptCounts),
          backgroundColor: '#0d6efd'
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });

    // 2. 프로그램별 차트 (도넛)
    const ctxTool = document.getElementById('toolChart').getContext('2d');
    if (toolChartObj) toolChartObj.destroy();
    toolChartObj = new Chart(ctxTool, {
      type: 'doughnut',
      data: {
        labels: Object.keys(toolCounts),
        datasets: [{
          data: Object.values(toolCounts),
          backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545', '#0dcaf0', '#6c757d']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }
</script>

</body>
</html>
